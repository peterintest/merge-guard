<svg viewBox="0 0 980 550" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6472"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a6ea5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="550" fill="#fafafa"/>

  <g transform="translate(0,-60)">

  <!-- GitHub Repository -->
  <rect x="60" y="100" width="200" height="70" rx="10" fill="#ffffff" stroke="#24292e" stroke-width="1.5"/>
  <text x="160" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#24292e">GitHub Repository</text>
  <text x="160" y="148" text-anchor="middle" font-size="11" fill="#6b7280">Pull request opened / updated</text>

  <!-- Webhook Proxy -->
  <rect x="60" y="220" width="200" height="70" rx="10" fill="#f9fafb" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="160" y="243" text-anchor="middle" font-size="13" font-weight="600" fill="#4b5563">Webhook Proxy [Future]</text>
  <text x="160" y="260" text-anchor="middle" font-size="10.5" fill="#6b7280">Ingests + verifies events</text>
  <text x="160" y="274" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Planned Production Bridge</text>

  <!-- Pub/Sub -->
  <rect x="60" y="340" width="200" height="70" rx="10" fill="#fff7ed" stroke="#c2761b" stroke-width="1.5"/>
  <text x="160" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#9a4b0b">GCP Pub/Sub</text>
  <text x="160" y="388" text-anchor="middle" font-size="11" fill="#8a6b4f">PR event topic</text>

  <!-- Vertex AI Agent Runtime (center, larger) -->
  <rect x="360" y="220" width="280" height="190" rx="12" fill="#eef4fc" stroke="#3a6ea5" stroke-width="2"/>
  <text x="500" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#1f4e8c">Vertex AI Agent Runtime</text>
  <text x="500" y="270" text-anchor="middle" font-size="11" fill="#4a6a91">merge_guard (ADK agent)</text>

  <rect x="384" y="288" width="232" height="34" rx="6" fill="#ffffff" stroke="#a9c3e0"/>
  <text x="500" y="309" text-anchor="middle" font-size="11.5" fill="#1f2937">1. fetch_pr_context (via MCP)</text>

  <rect x="384" y="330" width="232" height="34" rx="6" fill="#ffffff" stroke="#a9c3e0"/>
  <text x="500" y="351" text-anchor="middle" font-size="11.5" fill="#1f2937">2. redact_secrets (regex, local)</text>

  <rect x="384" y="372" width="232" height="34" rx="6" fill="#ffffff" stroke="#a9c3e0"/>
  <text x="500" y="393" text-anchor="middle" font-size="11.5" fill="#1f2937">3. triage_and_audit (Gemini 2.5 Flash)</text>

  <!-- GitHub MCP Server -->
  <rect x="700" y="255" width="220" height="90" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="810" y="285" text-anchor="middle" font-size="14" font-weight="600" fill="#5b21b6">GitHub MCP Server</text>
  <text x="810" y="304" text-anchor="middle" font-size="11" fill="#6b7280">mcp-server-github</text>
  <text x="810" y="321" text-anchor="middle" font-size="10.5" fill="#8b7cb8">stdio transport</text>

  <!-- Trivial vs standard branch -->
  <rect x="360" y="460" width="130" height="60" rx="10" fill="#eefaf0" stroke="#2e9e5b" stroke-width="1.5"/>
  <text x="425" y="484" text-anchor="middle" font-size="12" font-weight="600" fill="#1f7a42">Trivial PR</text>
  <text x="425" y="502" text-anchor="middle" font-size="10.5" fill="#4a8a63">Auto-approved</text>

  <rect x="510" y="460" width="130" height="60" rx="10" fill="#fdf2f2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="575" y="484" text-anchor="middle" font-size="12" font-weight="600" fill="#a3291b">Standard / High-Risk</text>
  <text x="575" y="502" text-anchor="middle" font-size="10.5" fill="#b85c50">Needs review</text>

  <!-- Dashboard -->
  <rect x="700" y="460" width="220" height="90" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="1.5"/>
  <text x="810" y="490" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2937">MergeGuard Dashboard</text>
  <text x="810" y="509" text-anchor="middle" font-size="11" fill="#6b7280">FastAPI on Cloud Run</text>
  <text x="810" y="527" text-anchor="middle" font-size="10.5" fill="#6b7280">Approve / Request changes</text>

  <!-- Arrows -->
  <line x1="160" y1="170" x2="160" y2="220" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="200" font-size="10" fill="#6b7280">webhook</text>

  <line x1="160" y1="290" x2="160" y2="340" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="320" font-size="10" fill="#6b7280">publish</text>

  <line x1="260" y1="375" x2="360" y2="330" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="305" y="315" text-anchor="middle" font-size="10" fill="#6b7280">push subscription</text>

  <!-- Bidirectional MCP arrow -->
  <line x1="640" y1="300" x2="700" y2="300" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arrowBlue)" marker-start="url(#arrowBlue)"/>
  <text x="670" y="290" text-anchor="middle" font-size="9.5" fill="#7c3aed">stdio</text>

  <!-- Agent to branches -->
  <line x1="460" y1="410" x2="425" y2="460" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="410" x2="575" y2="460" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="435" text-anchor="middle" font-size="10" fill="#6b7280">triage route</text>

  <!-- Standard branch to dashboard -->
  <line x1="640" y1="500" x2="700" y2="500" stroke="#5b6472" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="670" y="490" text-anchor="middle" font-size="9.5" fill="#6b7280">suspend</text>

  <!-- Dashboard back to agent (resume) -->
  <path d="M 810 460 L 810 400 L 640 400" fill="none" stroke="#2e9e5b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="725" y="390" text-anchor="middle" font-size="10" fill="#2e9e5b">resume (reviewer decision)</text>

  <!-- Legend -->
  <rect x="60" y="560" width="14" height="14" fill="#ffffff" stroke="#5b6472"/>
  <text x="80" y="571" font-size="10.5" fill="#4b5563">Solid = event flow</text>

  <line x1="220" y1="567" x2="250" y2="567" stroke="#2e9e5b" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="258" y="571" font-size="10.5" fill="#4b5563">Dashed = human-in-the-loop resume</text>

  <line x1="500" y1="567" x2="530" y2="567" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="538" y="571" font-size="10.5" fill="#4b5563">Dotted/Dashed Grey = Future integration</text>
  </g>
</svg>
